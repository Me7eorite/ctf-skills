services:
  challenge:
    image: {{IMAGE_NAME}}
    container_name: {{CONTAINER_NAME}}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BINARY_NAME: {{BINARY_NAME}}
        CTF_UID: "1000"
        CTF_GID: "1000"
    ports:
      - "{{HOST_PORT}}:{{SERVICE_PORT}}"
    environment:
      - FLAG={{FLAG}}
    restart: unless-stopped
