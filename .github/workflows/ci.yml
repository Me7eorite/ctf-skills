name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  focused-ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Focused Ruff for research/design/build admission
        run: >
          uv run ruff check
          src/services/design_prompt.py
          src/services/research_job_service.py
          src/services/research_output.py
          src/services/build_orchestration_service.py
          tests/app/test_build_orchestration_service.py
