[project]
name = "ctf-skills"
version = "0.1.0"
requires-python = ">=3.11"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
target-version = "py312"
line-length = 120
extend-exclude = [
  ".uv-cache",
  ".venv",
  "challenge-factory/.hermes",
  "challenge-factory/.uv-cache",
  "challenge-factory/.venv",
  "challenge-factory/venv",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
