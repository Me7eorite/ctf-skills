<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Challenge Factory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            canvas: "#FAFAFA",
            surface: "#FFFFFF",
            line: "#ECECEC",
            "line-strong": "#D9D9D9",
            ink: {
              50: "#F7F7F7", 100: "#F0F0F0", 200: "#E5E5E5", 300: "#D4D4D4",
              400: "#A3A3A3", 500: "#737373", 600: "#525252", 700: "#404040",
              800: "#262626", 900: "#171717"
            },
            brand: { 50: "#EFF6FF", 500: "#3B82F6", 600: "#2563EB", 700: "#1D4ED8" }
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'SFMono-Regular', 'Menlo', 'Consolas', 'monospace']
          },
          boxShadow: {
            card: '0 1px 2px rgba(15,23,42,.04)',
            elevated: '0 1px 3px rgba(15,23,42,.06), 0 12px 28px rgba(15,23,42,.04)'
          }
        }
      }
    };
  </script>
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
</head>
<body class="min-h-screen bg-canvas text-ink-900 antialiased font-sans">
  <div class="min-h-screen lg:grid lg:grid-cols-[240px_minmax(0,1fr)]">
    <!-- Sidebar -->
    <aside class="border-b border-line bg-surface lg:min-h-screen lg:border-b-0 lg:border-r">
      <div class="flex h-16 items-center justify-between px-5 lg:h-[68px]">
        <div class="flex items-center gap-2.5">
          <div class="grid size-8 place-items-center rounded-md bg-ink-900 text-white">
            <i data-lucide="blocks" class="size-4"></i>
          </div>
          <div>
            <div class="text-[13px] font-semibold leading-tight">Challenge Factory</div>
            <div class="text-[11px] text-ink-500 leading-tight">CTF Agent 控制台</div>
          </div>
        </div>
        <button id="mobileMenu" class="grid size-8 place-items-center rounded-md border border-line lg:hidden" title="导航">
          <i data-lucide="menu" class="size-4"></i>
        </button>
      </div>
      <nav id="sidebarNav" class="hidden gap-0.5 border-t border-line p-3 lg:flex lg:flex-col lg:border-t-0">
        <button class="nav-item" data-target="overview"><i data-lucide="layout-dashboard" class="size-4"></i>概览</button>
        <button class="nav-item" data-target="progress"><i data-lucide="activity" class="size-4"></i>实时进度</button>
        <button class="nav-item" data-target="seeds"><i data-lucide="sprout" class="size-4"></i>种子配置</button>
        <button class="nav-item" data-target="challenges"><i data-lucide="flag" class="size-4"></i>题目</button>
        <button class="nav-item" data-target="shards"><i data-lucide="layers-3" class="size-4"></i>任务分片</button>
        <button class="nav-item" data-target="logs"><i data-lucide="terminal" class="size-4"></i>运行日志</button>
        <div class="my-3 border-t border-line"></div>
        <div class="px-2 pb-1 text-[10px] font-semibold uppercase tracking-wider text-ink-400">研究</div>
        <button class="nav-item" data-target="research"><i data-lucide="microscope" class="size-4"></i>研究请求</button>
      </nav>
      <div class="hidden px-5 pt-6 lg:block">
        <div class="border-t border-line pt-5">
          <div class="mb-2 flex items-center justify-between gap-3 text-[11px] text-ink-500">
            <span>Worker</span>
            <span id="workerLabel" class="max-w-32 truncate text-right" title="Worker 状态">空闲</span>
          </div>
          <div class="h-1 overflow-hidden rounded-full bg-ink-100">
            <div id="workerBar" class="h-full w-0 bg-emerald-500"></div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="min-w-0">
      <header class="sticky top-0 z-10 flex h-16 items-center justify-between border-b border-line bg-surface/80 px-4 backdrop-blur-md sm:px-6 lg:h-[68px] lg:px-8">
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2 text-[11px] text-ink-400">
            <span>Challenge Factory</span>
            <i data-lucide="chevron-right" class="size-3"></i>
            <span id="breadcrumb" class="text-ink-600">概览</span>
          </div>
          <h1 id="pageTitle" class="mt-0.5 text-[15px] font-semibold leading-tight">生产概览</h1>
        </div>
        <div class="ml-3 flex shrink-0 items-center gap-2">
          <span id="updatedAt" class="hidden text-[11px] text-ink-400 sm:inline">同步中</span>
          <button id="refreshButton" class="grid size-9 place-items-center rounded-md border border-line bg-surface hover:bg-ink-50" title="刷新">
            <i id="refreshIcon" data-lucide="refresh-cw" class="size-4"></i>
          </button>
          <button id="validateButton" class="hidden h-9 items-center gap-2 rounded-md border border-line bg-surface px-3 text-[13px] font-medium hover:bg-ink-50 sm:flex">
            <i data-lucide="shield-check" class="size-4"></i><span>重新验证</span>
          </button>
          <button id="workerButton" class="hidden h-9 items-center gap-2 rounded-md bg-ink-900 px-3 text-[13px] font-medium text-white hover:bg-ink-800 sm:flex">
            <i data-lucide="play" class="size-4"></i><span>启动 Worker</span>
          </button>
        </div>
      </header>

      <div class="p-4 pb-24 sm:p-6 lg:p-8">
        <section data-view="overview" class="view"></section>
        <section data-view="progress" class="view"></section>
        <section data-view="seeds" class="view"></section>
        <section data-view="challenges" class="view"></section>
        <section data-view="shards" class="view"></section>
        <section data-view="logs" class="view"></section>
        <section data-view="research" class="view"></section>
      </div>
    </main>
  </div>

  <!-- Mobile bottom bar -->
  <div class="fixed inset-x-0 bottom-0 z-20 grid grid-cols-2 gap-2 border-t border-line bg-surface p-3 sm:hidden">
    <button id="mobileValidateButton" class="flex h-10 items-center justify-center gap-2 rounded-md border border-line text-[13px] font-medium">
      <i data-lucide="shield-check" class="size-4"></i>重新验证
    </button>
    <button id="mobileWorkerButton" class="flex h-10 items-center justify-center gap-2 rounded-md bg-ink-900 text-[13px] font-medium text-white">
      <i data-lucide="play" class="size-4"></i>启动 Worker
    </button>
  </div>

  <div id="toast" class="hidden"></div>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
