<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Challenge Factory</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/sidebar.css">
  <link rel="stylesheet" href="/css/header.css">
  <link rel="stylesheet" href="/css/components/card.css">
  <link rel="stylesheet" href="/css/components/table.css">
  <link rel="stylesheet" href="/css/components/pill.css">
  <link rel="stylesheet" href="/css/components/dot.css">
  <link rel="stylesheet" href="/css/components/form.css">
  <link rel="stylesheet" href="/css/components/button.css">
  <link rel="stylesheet" href="/css/components/toast.css">
  <link rel="stylesheet" href="/css/components/tabs.css">
  <link rel="stylesheet" href="/css/components/empty.css">
  <link rel="stylesheet" href="/css/components/filter.css">
  <link rel="stylesheet" href="/css/components/metrics.css">
  <link rel="stylesheet" href="/css/components/breadcrumb.css">
  <link rel="stylesheet" href="/css/views/progress.css">
  <link rel="stylesheet" href="/css/views/logs.css">
  <link rel="stylesheet" href="/css/views/research-submit.css">
  <link rel="stylesheet" href="/css/views/research-requests.css">
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js"></script>
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="layout-sidebar">
      <div class="sidebar-brand">
        <div class="flex items-center gap-2.5">
          <div class="sidebar-logo">
            <i data-lucide="blocks" class="size-4"></i>
          </div>
          <div>
            <div class="sidebar-title">Challenge Factory</div>
            <div class="sidebar-subtitle">CTF Agent 控制台</div>
          </div>
        </div>
        <button id="mobileMenu" class="sidebar-menu-toggle lg:hidden" title="导航">
          <i data-lucide="menu" class="size-4"></i>
        </button>
      </div>
      <nav id="sidebarNav" class="sidebar-nav hidden lg:flex">
        <!-- 研究 -->
        <div class="sidebar-nav-group">
          <div class="sidebar-nav-group-title">研究</div>
          <button class="sidebar-nav-item" data-target="research-submit">
            <i data-lucide="plus-circle"></i>新建需求
          </button>
          <button class="sidebar-nav-item" data-target="research-requests">
            <i data-lucide="list"></i>需求管理
          </button>
          <button class="sidebar-nav-item" data-target="design-tasks">
            <i data-lucide="workflow"></i>Design Tasks
          </button>
          <button class="sidebar-nav-item" data-target="research-runs">
            <i data-lucide="loader"></i>运行记录
          </button>
          <button class="sidebar-nav-item" data-target="research-logs">
            <i data-lucide="file-text"></i>运行日志
          </button>
        </div>
        <div class="sidebar-nav-divider"></div>
        <!-- 核心 -->
        <div class="sidebar-nav-group">
          <div class="sidebar-nav-group-title">核心</div>
          <button class="sidebar-nav-item" data-target="overview">
            <i data-lucide="layout-dashboard"></i>概览
          </button>
          <button class="sidebar-nav-item" data-target="progress">
            <i data-lucide="activity"></i>实时进度
          </button>
          <button class="sidebar-nav-item" data-target="challenges">
            <i data-lucide="flag"></i>题目分类
          </button>
          <button class="sidebar-nav-item" data-target="shards">
            <i data-lucide="layers-3"></i>任务列表
          </button>
          <button class="sidebar-nav-item" data-target="logs">
            <i data-lucide="terminal"></i>运行日志
          </button>
        </div>
        <div class="sidebar-nav-divider"></div>
        <!-- 待删除 -->
        <div class="sidebar-nav-group">
          <div class="sidebar-nav-group-title">待删除</div>
          <button class="sidebar-nav-item" data-target="seeds">
            <i data-lucide="sprout"></i>种子配置
          </button>
        </div>
      </nav>
      <div class="sidebar-worker-status">
        <div class="sidebar-worker-card">
          <div class="sidebar-worker-header">
            <div class="sidebar-worker-header-left">
              <div id="workerDot" class="sidebar-worker-dot idle"></div>
              <span class="sidebar-worker-name">Worker</span>
            </div>
            <span id="workerLabel" class="sidebar-worker-state idle">空闲</span>
          </div>
          <div class="sidebar-worker-bar">
            <div id="workerBar" class="sidebar-worker-bar-fill idle"></div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="layout-main">
      <header class="layout-header">
        <div class="header-left">
          <div class="header-breadcrumb">
            <span>Challenge Factory</span>
            <i data-lucide="chevron-right" class="header-breadcrumb-separator"></i>
            <span id="breadcrumbGroup">核心</span>
            <i data-lucide="chevron-right" class="header-breadcrumb-separator"></i>
            <span id="breadcrumb" class="header-breadcrumb-current">概览</span>
          </div>
          <h1 id="pageTitle" class="header-title">生产概览</h1>
        </div>
        <div class="header-right">
          <span id="updatedAt" class="header-sync-time hidden">同步中</span>
          <button id="refreshButton" class="header-icon-button" title="刷新">
            <i id="refreshIcon" data-lucide="refresh-cw"></i>
          </button>
          <button id="validateButton" class="header-action-button secondary hidden sm:flex">
            <i data-lucide="shield-check"></i>
            <span>重新验证</span>
          </button>
          <button id="workerButton" class="header-action-button primary hidden sm:flex">
            <i data-lucide="play"></i>
            <span>启动 Worker</span>
          </button>
        </div>
      </header>

      <div class="layout-content" id="mainContent">
        <section data-view="overview" class="view"></section>
        <section data-view="progress" class="view"></section>
        <section data-view="challenges" class="view"></section>
        <section data-view="shards" class="view"></section>
        <section data-view="logs" class="view"></section>
        <section data-view="seeds" class="view"></section>
        <section data-view="research-submit" class="view"></section>
        <section data-view="research-requests" class="view"></section>
        <section data-view="design-tasks" class="view"></section>
        <section data-view="research-runs" class="view"></section>
        <section data-view="research-logs" class="view"></section>
      </div>
    </main>
  </div>

  <!-- Mobile bottom bar -->
  <div class="layout-mobile-bar">
    <button id="mobileValidateButton" class="btn btn-secondary btn-block">
      <i data-lucide="shield-check"></i>
      <span>重新验证</span>
    </button>
    <button id="mobileWorkerButton" class="btn btn-primary btn-block">
      <i data-lucide="play"></i>
      <span>启动 Worker</span>
    </button>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
