# Alembic configuration.
#
# The URL is intentionally blank here. ``alembic/env.py`` resolves the engine
# through ``persistence.engine.create_engine_from_env()`` so the project has
# exactly one path that reads ``DATABASE_URL``.

[alembic]
script_location = alembic
prepend_sys_path = . src
version_path_separator = os
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
